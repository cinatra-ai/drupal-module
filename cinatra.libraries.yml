bundle:
  version: 1.1.x
  license:
    # The widget bundle (js/cinatra-widget.js) is the Cinatra app frontend,
    # vendored locally and licensed Apache-2.0. It is distributed inside this
    # GPL-2.0-or-later module; Apache-2.0 is GPL-compatible (under GPLv3, which
    # "GPL-2.0-or-later" reaches), so the module stays distributable on
    # Drupal.org. The bundle is shipped LOCALLY — it is not fetched over HTTP.
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
    gpl-compatible: true
  js:
    js/cinatra-widget.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings

# Always-present fallback chrome (floating button + graceful "cannot connect"
# error card). Attached whenever the Cinatra URL is set so the widget surface
# is never silently missing; hides itself once the real bundle mounts.
fallback:
  version: 1.1.x
  css:
    component:
      css/cinatra-fallback.css: {}
  js:
    js/cinatra-fallback.js: {}
  dependencies:
    - core/drupal
    - core/drupalSettings
