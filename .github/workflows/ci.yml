name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.3"
      - name: php -l (lint every PHP file)
        run: |
          set -e
          find . -path ./vendor -prune -o \( -name '*.php' -o -name '*.module' -o -name '*.install' \) -print | while read -r f; do
            php -l "$f"
          done

  js-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "20"
      - name: Widget mount + embed-bridge behavior tests (no bundler required)
        run: node tests/test-widget-negotiation.mjs
      - name: Widget source-of-truth drift / parity gate (cinatra#411)
        # Asserts the security-critical invariants on the canonical vendored
        # widget (js/cinatra-widget.js): no apiKey in the browser, the
        # tokenEndpoint broker + short-lived-token Bearer stream, the shared
        # contract-version set, and NO reintroduction of the dead
        # /api/{wordpress,drupal}/bundle.js route in shipped/admin/schema strings.
        # Identical to the wordpress-plugin gate (cross-repo lockstep). See
        # cinatra docs/widget-source-of-truth.md.
        run: node tools/widget-parity-check.mjs

  yaml-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate every YAML file parses
        run: |
          set -e
          python3 - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              try:
                  list(yaml.safe_load_all(open(f, encoding='utf-8')))
                  print(f"ok: {f}")
              except Exception as e:  # noqa: BLE001
                  print(f"BAD: {f}: {e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

  phpcs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gating. The dev tooling (composer.json + phpcs.xml.dist) is in place and
    # the tree is phpcs-clean, so a regression must fail the build.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.3"
          tools: composer
      - name: Install dev dependencies
        # Install from the project composer.json, whose config.allow-plugins
        # authorizes dealerdirect/phpcodesniffer-composer-installer (the missing
        # allow-plugins entry is what broke the previous global-require install).
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPCS (Drupal, DrupalPractice)
        run: vendor/bin/phpcs -q

  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gating. phpstan-drupal at the level pinned in phpstan.neon.dist; the tree
    # currently passes, so a regression must fail the build.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "8.3"
          tools: composer
      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress
