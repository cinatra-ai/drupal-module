name: truthful-attribution-gate
# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci).
# WARN mode (advisory rollout): findings are annotated and the check is ALWAYS
# green — it never fails a PR. No .github/gate-suite.json is committed (WARN
# scope exercises presence + the human arm; the gate-suite arm is not exercised
# without a suite). Pinned to an immutable engine SHA on ci main (one commit
# ahead of the current release tag), so the version comment encodes it as a
# main build rather than claiming a tagged release.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  # actions:read is MANDATORY: the engine resolves a reusable-workflow check-run
  # to its Actions run (GET /actions/runs/{id}) to verify referenced_workflows[]
  # at the pinned SHA. With an explicit permissions block, any omitted scope
  # defaults to `none`, and a called reusable workflow cannot exceed the caller's
  # grant — so omitting this causes startup_failure (red/missing check), which
  # WARN mode CANNOT rescue (it fails before any step runs). Do not drop it.
  actions: read

jobs:
  truthful-attribution-gate:                 # caller job id MUST stay this exact string
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@8eede1022e835997d94974e4bd6205daf72131a2 # v0.0.0-main.8eede10
    with:
      mode: warn
      ref: 8eede1022e835997d94974e4bd6205daf72131a2
