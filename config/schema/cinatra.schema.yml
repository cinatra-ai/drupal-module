# Schema for the Cinatra module configuration.
cinatra.settings:
  type: config_object
  label: 'Cinatra settings'
  mapping:
    cinatra_url:
      type: uri
      label: 'Cinatra URL'
    instance_id:
      type: string
      label: 'Cinatra instance ID'
    api_key:
      # Long-lived integration key (credential). Drupal has no native "secret"
      # scalar type, so this is documented as a credential here and rendered as
      # a password-style field in SettingsForm. It is held server-side only and
      # is never exposed to the browser — the browser receives only short-lived
      # tokens minted by the cinatra.token broker route.
      type: string
      label: 'Cinatra API key (credential — held server-side, never sent to the browser)'
    webhook_secret:
      # Webhook signing secret returned by the connect exchange (credential).
      # Persisted server-side ONLY — like api_key, it is never sent to the
      # browser. A whsec_ Standard-Webhooks secret: the node-publish emitter
      # signs its deliveries to cinatra's generic /webhook route with it
      # (cinatra-ai/cinatra#974). Written together with webhook_binding_id as
      # a PAIR (the exchange returns both or neither). Same "no native secret
      # scalar" caveat as api_key applies.
      type: string
      label: 'Cinatra webhook secret (credential — held server-side, never sent to the browser)'
    webhook_binding_id:
      # Server-issued opaque binding id returned by the connect exchange
      # together with webhook_secret (cinatra-ai/cinatra#974). It is the final
      # path segment of the generic inbound-webhook URL the node-publish
      # emitter POSTs to; cinatra resolves the connected-site identity and the
      # per-binding secret from it. Not itself a secret (it travels in the
      # URL), but held server-side only like the rest of the connection state.
      type: string
      label: 'Cinatra webhook binding id (server-issued; pairs with the webhook secret)'
